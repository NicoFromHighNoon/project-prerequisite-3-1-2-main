<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:if="${user.id == null}">Add New User</title>
    <title th:if="${user.id != null}">Edit User</title>
</head>
<body>

<h1 th:if="${user.id == null}">Add New User</h1>
<h1 th:if="${user.id != null}">Edit User</h1>

<form th:action="${user.id == null} ? @{/admin/create} : @{/admin/update}"
      th:object="${user}"
      method="post">

    <input type="hidden" th:field="*{id}" />

    <label>First Name:</label>
    <input type="text" th:field="*{firstName}" /><br/><br/>

    <label>Last Name:</label>
    <input type="text" th:field="*{lastName}" /><br/><br/>

    <label>Email:</label>
    <input type="email" th:field="*{email}" /><br/><br/>

    <label>Username:</label>
    <input type="text" th:field="*{username}" /><br/><br/>

    <label>Password:</label>
    <input type="password" th:field="*{password}" /><br/><br/>

    <button type="submit">Save</button>
</form>

<br>
<a th:href="@{/admin}">← Back to Admin panel</a>

</body>
</html>
