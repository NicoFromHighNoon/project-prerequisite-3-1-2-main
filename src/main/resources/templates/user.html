<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User</title>
</head>
<body>

<h1 th:if="${user != null}" th:text="'Welcome, ' + ${user.username} + '!'">Welcome!</h1>

<div th:if="${user != null}">
    <p><strong>First Name:</strong> <span th:text="${user.firstName}"></span></p>
    <p><strong>Last Name:</strong>  <span th:text="${user.lastName}"></span></p>
    <p><strong>Email:</strong>       <span th:text="${user.email}"></span></p>
</div>

<div th:if="${error}" style="color:red;">
    <p th:text="${error}"></p>
</div>

<br>
<form th:action="@{/logout}" method="post" th:if="${user != null}">
    <button type="submit">Logout</button>
</form>

</body>
</html>
