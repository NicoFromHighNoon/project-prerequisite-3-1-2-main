<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:if="${user.id == null}">Add User</title>
    <title th:if="${user.id != null}">Edit User</title>
</head>
<body>
<h1 th:if="${user.id == null}">Add User</h1>
<h1 th:if="${user.id != null}">Edit User</h1>

<form th:action="${user.id == null} ? @{/users/create} : @{/users/update}"
      th:object="${user}"
      method="post">

    <input type="hidden" name="id" th:value="${user?.id}" />

    <label>First Name:</label>
    <input type="text" th:field="*{firstName}" /><br/>

    <label>Last Name:</label>
    <input type="text" th:field="*{lastName}" /><br/>

    <label>Email:</label>
    <input type="text" th:field="*{email}" /><br/>

    <button type="submit">Save</button>
</form>

<a href="/users">Back to List</a>
</body>
</html>
